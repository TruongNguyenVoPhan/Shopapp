<app-header></app-header>
<div class="container">
    <div class="intro-section">
        <h1>Đây là trang chi tiết sản phẩm</h1>
        <p>Sử dụng Bootstrap</p>
    </div>    
    <div class="row">
      <div class="col-md-6">
        <div id="carouselExample" class="carousel slide" data-bs-ride="carousel">
          <div class="carousel-inner">
            <div *ngFor="let image of product?.product_images; let i = index" 
                 class="carousel-item" [ngClass]="{'active': i === currentImageIndex}">
              <div class="square-image">
                <img [src]="image.image_url" class="product-image" alt="Product Image">
              </div>
            </div>
          </div>
          <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" 
                  data-bs-slide="prev" (click)="previousImage()">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
          </button>
          <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" 
                  data-bs-slide="next" (click)="nextImage()">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
          </button>
        </div>
        <div class="row">
          <div class="thumbnail-container">
            <div *ngFor="let image of product?.product_images; let i = index" 
                 class="thumbnail-item" 
                 [ngClass]="{'active': i === currentImageIndex}"
                 (click)="thumbnailClick(i)">
              <img [src]="image.image_url" class="thumbnail-image" alt="Thumbnail Image">
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="product-details">
          <h2>{{ product?.name }}</h2>
          <p>{{ product?.description }}</p>

          <p class="product-price text-danger fw-bold">
            {{ product?.price | number:'1.0-0' }}₫
          </p>

          <!-- Tồn kho -->
          <div class="mb-2">
            <span *ngIf="product && product.quantity > 0" class="text-success fw-bold">
              Còn {{ product.quantity }} sản phẩm
            </span>

            <span *ngIf="product && product.quantity <= 0" class="text-danger fw-bold">
              Hết hàng
            </span>
          </div>

          <div class="product-actions">
            <button 
              class="btn btn-primary"
              (click)="addToCart()"
              [disabled]="(product?.quantity ?? 0) <= 0">
              Thêm vào giỏ hàng
            </button>

            <button 
              class="btn btn-success"
              (click)="buyNow()"
              [disabled]="(product?.quantity ?? 0) <= 0">
              Mua ngay
            </button>
          </div>

          <div class="product-quantity mt-3">
            <div class="border-wrapper">
              <button (click)="decreaseQuantity()">-</button>
              <input type="text" [value]="quantity" readonly>
              <button (click)="increaseQuantity()">+</button>
            </div>
          </div>
        </div>  
      </div>      
    </div>    
</div>
<app-footer></app-footer>
