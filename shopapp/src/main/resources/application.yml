#spring.application.name=shopapp
server:
  port: 8088
spring:
  datasource:
#    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/ShopApp?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    url: jdbc:mysql://localhost:3306/ShopApp?useSSL=false&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password:

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}      
    password: ${MAIL_PASSWORD}     
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  vnpay:
    tmn-code: ${VNPAY_TMN_CODE}
    hash-secret: ${VNPAY_HASH_SECRET}
    url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
    return-url: http://localhost:8088/api/v1/payment/vnpay-return


  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
#  redis:
#    host: ${REDIS_HOST:localhost} # Default to 'localhost' if not provided
#    port: ${REDIS_PORT:6379}      # Default to 6379 if not provided
  message:
      basename: i18n/messages
      encoding: UTF-8
      default-locale: en
api:
  prefix: api/v1
jwt:
  expiration: 2592000 #30 days = 30 * 24(gio) * 60(phut) * 60(giay)
  secretKey: ${JWT_SECRET}

logging.level.org.springframework.security: DEBUG